          <div id="news-view" class="view-pane hidden">
            <div class="news-page">

              <!-- ── Dark Header Bar ─────────────────────────────────── -->
              <header class="news-header-bar">
                <div class="news-header-left">
                  <h2>Market Announcements</h2>
                  <span id="news-live-badge" class="live-badge hidden">LIVE</span>
                </div>
                <div class="news-header-right">
                  <span id="news-live-clock" class="live-clock"></span>
                  <div id="fetcher-progress-container" class="news-header-progress" style="display: none;">
                    <span id="fetcher-status-text">Processing...</span>
                    <progress id="fetcher-progress" value="0" max="100"></progress>
                  </div>
                  <div id="fundamental-progress-container" class="news-header-progress" style="display: none;">
                    <span id="fundamental-status-text">Refreshing...</span>
                    <progress id="fundamental-progress" value="0" max="100"></progress>
                  </div>
                  <div id="fundamental-metadata-container" class="news-metadata">
                    <span id="fundamental-last-refresh" style="font-weight: bold; color: var(--text);"></span>
                    <span id="fundamental-count" style="color: var(--muted);"></span>
                  </div>
                  <button id="news-sound-btn" type="button" class="sound-mode-btn" title="Sound alerts: OFF">🔕</button>
                  <button id="news-refresh-fundamentals" type="button" class="secondary-button">Refresh Fundamentals</button>
                  <button id="news-fetcher-toggle" type="button" class="primary-button">Start Fetcher</button>
                </div>
              </header>

              <!-- ── Filter Bar ──────────────────────────────────────── -->
              <div class="news-filter-bar">
                <span class="filter-label">Filter</span>
                <button id="pill-positive" type="button" class="sentiment-toggle-pill positive active">▲ Positive</button>
                <button id="pill-negative" type="button" class="sentiment-toggle-pill negative active">▼ Negative</button>
                <button id="pill-neutral" type="button" class="sentiment-toggle-pill neutral">● Neutral</button>
                <span id="news-new-badge" class="news-new-badge hidden">0 new ↑</span>
                <div id="announcement-stats-inline" class="announcement-stats-inline"></div>
                <div class="news-filter-inputs">
                  <input type="date" id="news-filter-start" title="From date" />
                  <input type="date" id="news-filter-end" title="To date" />
                  <input type="text" id="news-filter-symbol" placeholder="Symbol..." title="Filter by symbol" />
                  <button id="news-filter-apply" type="button" class="secondary-button" style="height: 30px; padding: 0 10px; font-size: 12px;">Apply</button>
                </div>
              </div>

              <!-- ── News Feed ───────────────────────────────────────── -->
              <div id="news-feed" class="news-feed"></div>

            </div>
          </div>
