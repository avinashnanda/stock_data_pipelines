        <aside class="right-panel">
          <div id="watchlist-resizer" class="watchlist-resizer"></div>
          <button id="watchlist-rail-toggle" type="button" class="watchlist-rail-toggle hidden" aria-label="Show watchlist" title="Show watchlist">&gt;&gt;</button>
          <section class="watchlist-panel">
            <div class="watchlist-topbar">
              <div class="watchlist-title-wrap">
                <button id="watchlist-flag" type="button" class="watchlist-flag" aria-label="watchlist marker"></button>
                <div class="watchlist-title-stack">
                  <div class="watchlist-dropdown-container">
                    <button id="watchlist-dropdown-trigger" type="button" class="watchlist-select-trigger">
                      <span id="active-watchlist-name">Loading...</span>
                      <svg class="dropdown-caret" width="10" height="6" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                    </button>
                    <div id="watchlist-dropdown-menu" class="watchlist-dropdown-menu hidden">
                      <div class="menu-item" id="wl-menu-copy">Make a copy...</div>
                      <div class="menu-item" id="wl-menu-rename">Rename</div>
                      <div class="menu-item" id="wl-menu-clear">Clear list</div>
                      <div class="menu-item" id="wl-menu-delete" style="color: var(--danger);">Delete list</div>
                      <div class="menu-separator"></div>
                      <div id="watchlist-list-container">
                        <!-- Dynamic list of watchlists will be injected here -->
                      </div>
                      <div class="menu-separator"></div>
                      <div class="menu-item" id="wl-menu-new">Create new list...</div>
                    </div>
                  </div>
                  <span id="watchlist-subtitle" class="watchlist-subtitle">Custom synced watchlist</span>
                </div>
              </div>
              <div class="watchlist-actions">
                <button id="watchlist-panel-toggle" type="button" class="icon-button" aria-label="Hide watchlist" title="Hide watchlist">&lt;&lt;</button>
                <button id="watchlist-add" type="button" class="icon-button" title="Add symbol">+</button>
              </div>
            </div>
            <div id="watchlist-stats" class="watchlist-stats"></div>
            <div class="watchlist-header">
              <span>Symbol</span>
              <span>Last</span>
              <span>Chg</span>
              <span>Chg%</span>
            </div>
            <div class="watchlist-section">
              <span id="watchlist-section-label">Active List</span>
              <span id="watchlist-count" class="watchlist-count">0</span>
            </div>
            <div id="watchlist" class="watchlist"></div>
            <div class="news-sidebar-section" style="border-top: 1px solid var(--panel-border); flex: 1; overflow: hidden;">
              <!-- Watchlist News -->
              <div class="recent-arrivals-section" style="flex: 1;">
                <div class="sidebar-section-header">
                  <span class="arrival-dot"></span> WATCHLIST NEWS
                </div>
                <div id="recent-arrivals-feed" class="recent-arrivals-feed"></div>
              </div>
            </div>
          </section>
        </aside>
