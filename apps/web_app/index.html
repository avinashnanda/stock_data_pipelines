<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Charts</title>
    <link rel="stylesheet" href="/app.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="/charting_library/charting_library.standalone.js"></script>
    <script src="/js/datafeed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/js/state.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/watchlist.js"></script>
    <script src="/js/symbol-modal.js"></script>
    <script src="/js/screener.js"></script>
    <script src="/js/news.js"></script>
    <script src="/js/hedgefund.js" defer></script>
    <script src="/app.js" defer></script>
  </head>
  <body>
    <div class="shell">
      <div id="status" class="status sr-only" data-tone="neutral">Waiting for chart bootstrap...</div>

      <section class="platform-toolbar">
        <div class="toolbar-group symbol-group">
          <label class="toolbar-label" for="symbol-input">Symbol</label>
          <input id="symbol-input" type="text" value="RELIANCE" placeholder="RELIANCE" />
        </div>

        <div class="toolbar-group source-group">
          <label class="toolbar-label" for="source-select">Source</label>
          <select id="source-select"></select>
        </div>

        <div class="toolbar-actions">
          <button id="load-chart" type="button" class="primary-button">Load</button>
          <button id="theme-toggle" type="button" class="secondary-button">Night Mode</button>
        </div>
      </section>

      <main class="workspace">
        <section class="chart-shell">
          <div class="view-tabs">
            <button id="tab-price" type="button" class="view-tab active">Price</button>
            <button id="tab-screener" type="button" class="view-tab">Screener</button>
            <button id="tab-news" type="button" class="view-tab">Announcements</button>
            <button id="tab-hedgefund" type="button" class="view-tab">Hedge Fund</button>
          </div>

          <div id="price-view" class="view-pane">
            <div class="chart-card">
              <div id="tv_chart_container"></div>
            </div>
          </div>

          <!-- @include partials/screener-view.html -->
          <!-- @include partials/news-view.html -->
          <!-- @include partials/hedgefund-view.html -->
        </section>

        <!-- @include partials/watchlist-panel.html -->
      </main>
    </div>

    <!-- @include partials/symbol-modal.html -->

  </body>
</html>
